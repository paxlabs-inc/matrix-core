# gateway/deploy/nginx-snippet.conf
#
# Drop-in for /etc/nginx/sites-available/matrix.paxeer.app — INSIDE
# the existing `server { listen 80; ... }` block. Maps the public
# /gw/* path to the loopback gateway listener at 127.0.0.1:9090.
#
# Plan §10.2 verbatim. Streaming SSE-friendly: proxy_buffering off
# + chunked_transfer_encoding on + extended read timeout.
#
# DO NOT clobber the existing `location /` block (which routes to
# matrix-router on 127.0.0.1:8443) — the /gw/ path is a peer route,
# not a replacement.

location /gw/ {
    proxy_pass http://127.0.0.1:9090/;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Streaming: long-lived SSE responses for stream=true requests.
    proxy_buffering          off;
    proxy_request_buffering  off;
    proxy_read_timeout       300s;
    chunked_transfer_encoding on;

    # HTTP/1.1 + idle keep-alive (same as the matrix-router block).
    proxy_http_version 1.1;
    proxy_set_header Connection "";
}

# Optional unauthenticated healthz pass-through (the gateway's
# /healthz already returns plain JSON without auth; matrix-router
# also has /healthz so we use a separate path under /gw/healthz to
# avoid colliding).
location = /gw/healthz {
    proxy_pass http://127.0.0.1:9090/healthz;
    access_log off;
}
