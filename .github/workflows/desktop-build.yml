name: desktop-build

# Builds the Matrix Tauri desktop app for macOS (universal) and Windows
# (x64) on every push to main + on tag push + manually.
#
# Per the conversation that locked sess#29 deployment plan:
#   • Mac:     universal .dmg (aarch64-apple-darwin + x86_64-apple-darwin)
#   • Windows: x86_64-pc-windows-msvc .msi
#   • Linux:   skipped — not a ship target for non-dev end users.
#
# Signing: NOT enabled today. The workflow is structured so adding code
# signing later is a small change (one secret + a few `env:` lines per
# job). See `# SIGNING:` comments inline.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Optional tag to attach release to (when running manually)'
        required: false
        default: ''

concurrency:
  group: desktop-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write  # required for the release-creation step on tag push

env:
  GO_VERSION: '1.21'
  NODE_VERSION: '20'
  PNPM_VERSION: '10'
  # Vite env passed to the Vue build. Local-first install: no Supabase
  # touchpoint needed. Empty placeholders keep env.ts validation happy.
  VITE_DAEMON_BASE_URL: 'http://127.0.0.1:8080'
  VITE_BUILD_VERSION: ${{ github.ref_name }}
  VITE_BUILD_COMMIT: ${{ github.sha }}

jobs:
  build:
    name: build / ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS universal: one .dmg containing both Apple Silicon and
          # Intel binaries. Built on the latest macOS runner so both
          # toolchains are present (M-class runners cross-compile to x86_64
          # using the bundled SDK).
          - label: macos-universal
            os: macos-latest
            rust_targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
            tauri_args: '--target universal-apple-darwin'
            bundle_glob: 'desktop/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg'
            go_targets: 'darwin/arm64 darwin/amd64'
          - label: windows-x64
            os: windows-latest
            rust_targets: 'x86_64-pc-windows-msvc'
            tauri_args: ''
            bundle_glob: 'desktop/src-tauri/target/release/bundle/msi/*.msi'
            go_targets: 'windows/amd64'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: setup go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: executor/go.sum

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: setup rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri
          key: ${{ matrix.label }}

      # ───────────────────────────────────────────────────────────────
      # Build the bundled mcl-execute daemon for the target triple(s).
      # The desktop/scripts/build-daemon.sh script writes binaries into
      # desktop/src-tauri/binaries/ named per Tauri's externalBin
      # convention so the bundler picks them up automatically.
      # ───────────────────────────────────────────────────────────────
      - name: cross-compile mcl-execute (mac)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          cd executor
          mkdir -p ../desktop/src-tauri/binaries
          # Build both arch slices...
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 \
            go build -trimpath -ldflags="-s -w" \
            -o ../desktop/src-tauri/binaries/mcl-execute-aarch64-apple-darwin \
            ./cmd/mcl-execute
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 \
            go build -trimpath -ldflags="-s -w" \
            -o ../desktop/src-tauri/binaries/mcl-execute-x86_64-apple-darwin \
            ./cmd/mcl-execute
          # ...and lipo them into a single universal binary so Tauri's
          # `--target universal-apple-darwin` bundler finds
          # `mcl-execute-universal-apple-darwin` next to the per-arch
          # files. Per Tauri 2.x externalBin docs: the universal target
          # name is fixed and required for universal .dmg bundles.
          lipo -create -output \
            ../desktop/src-tauri/binaries/mcl-execute-universal-apple-darwin \
            ../desktop/src-tauri/binaries/mcl-execute-aarch64-apple-darwin \
            ../desktop/src-tauri/binaries/mcl-execute-x86_64-apple-darwin
          chmod +x ../desktop/src-tauri/binaries/mcl-execute-*
          ls -lh ../desktop/src-tauri/binaries

      - name: cross-compile mcl-execute (windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          cd executor
          mkdir -p ../desktop/src-tauri/binaries
          # CGO=0 keeps the build hermetic (no MSVC dep beyond Tauri's).
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 \
            go build -trimpath -ldflags="-s -w" \
            -o ../desktop/src-tauri/binaries/mcl-execute-x86_64-pc-windows-msvc.exe \
            ./cmd/mcl-execute
          ls -lh ../desktop/src-tauri/binaries

      # ───────────────────────────────────────────────────────────────
      # Vue client build. Tauri's beforeBuildCommand runs the same pnpm
      # build, but doing it explicitly here gives us a clean log line
      # and surfaces TS errors before the slower Rust compile.
      # ───────────────────────────────────────────────────────────────
      - name: install client deps
        working-directory: client
        run: pnpm install --frozen-lockfile

      - name: client typecheck + build
        working-directory: client
        run: pnpm build

      # ───────────────────────────────────────────────────────────────
      # Tauri install + build. tauri-action handles the bundler args,
      # picks up signing creds from env when present, and uploads the
      # resulting artifacts to a release when `tagName` is set.
      # ───────────────────────────────────────────────────────────────
      - name: install desktop tooling
        working-directory: desktop
        run: pnpm install --frozen-lockfile

      - name: tauri build
        working-directory: desktop
        shell: bash
        run: pnpm tauri build ${{ matrix.tauri_args }}
        env:
          # SIGNING: macOS — populate these secrets and the bundler will
          # codesign + notarize automatically. Leave empty for unsigned
          # builds (sess#29 path).
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # SIGNING: Windows — populate these and tauri picks up the cert
          # automatically. Self-signed certs work too (same env vars).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      # ───────────────────────────────────────────────────────────────
      # Always upload to artifacts (90-day retention) for testing.
      # ───────────────────────────────────────────────────────────────
      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: matrix-${{ matrix.label }}
          path: ${{ matrix.bundle_glob }}
          if-no-files-found: error
          retention-days: 90

  # ─────────────────────────────────────────────────────────────────────
  # Create a GitHub Release with the .dmg + .msi attached when the
  # workflow runs on a tag push. Manual dispatch with a tag_name input
  # works too (useful for one-off releases without committing a tag).
  # ─────────────────────────────────────────────────────────────────────
  release:
    name: release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.tag_name != ''
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: download mac artifact
        uses: actions/download-artifact@v4
        with:
          name: matrix-macos-universal
          path: ./dist/mac

      - name: download windows artifact
        uses: actions/download-artifact@v4
        with:
          name: matrix-windows-x64
          path: ./dist/win

      - name: list artifacts
        run: |
          ls -lh ./dist/mac
          ls -lh ./dist/win

      - name: resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: Matrix ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            ./dist/mac/*.dmg
            ./dist/win/*.msi
