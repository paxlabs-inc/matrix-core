    commit-message:
      prefix: ci
      include: scope
    groups:
      actions:
        applies-to: version-updates
        update-types:
          - minor
          - patch

  # ---- Daemon Docker image ----------------------------------------------
  - package-ecosystem: docker
    directory: /deploy/daemon
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Europe/Amsterdam
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - docker
      - deploy
    commit-message:
      prefix: deploy
      include: scope
