      interval: weekly
      day: monday
      time: "09:00"
      timezone: Europe/Amsterdam
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - javascript
      - marketplace
    commit-message:
      prefix: marketplace
      include: scope
    groups:
      npm-deps:
        applies-to: version-updates
        update-types:
          - minor
          - patch

  # ---- GitHub Actions ----------------------------------------------------
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Europe/Amsterdam
    open-pull-requests-limit: 5
    labels:
