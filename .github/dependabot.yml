version: 2

updates:
  # ---- Go modules (one entry per top-level go.mod) -----------------------
  - package-ecosystem: gomod
    directory: /cortex
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Europe/Amsterdam
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - go
      - cortex
    commit-message:
      prefix: cortex
      include: scope
    groups:
      go-deps:
        applies-to: version-updates
        update-types:
          - minor
          - patch

  - package-ecosystem: gomod
    directory: /MCL
    schedule:
