# deploy/chronos/nginx-snippet.conf
#
# OPTIONAL drop-in for /etc/nginx/sites-available/matrix.paxeer.app — INSIDE
# the existing `server { ... }` block. Maps the public /chronos/* path to the
# loopback chronosd listener at 127.0.0.1:9096.
#
# In the normal topology Chronos is NOT publicly exposed: the daemon's
# chronos.mjs proxy reaches it over the private/6PN network at
# MATRIX_CHRONOS_URL, and the dispatch worker reaches the router internally.
# This snippet exists only for operators who want an authenticated public
# surface (e.g. an admin dashboard). The transport token (CHRONOS_TOKEN) still
# gates every /v1 call, but DO NOT expose it without TLS + a tight allowlist.
#
# DO NOT clobber the existing `location /` block (which routes to matrix-router
# on 127.0.0.1:8443) — /chronos/ is a peer route, not a replacement.

location /chronos/ {
    proxy_pass http://127.0.0.1:9096/;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_read_timeout 60s;
}

# Unauthenticated healthz pass-through (chronosd /healthz returns plain JSON
# without auth). Separate path to avoid colliding with matrix-router /healthz.
location = /chronos/healthz {
    proxy_pass http://127.0.0.1:9096/healthz;
    access_log off;
}
